info:
  name: Shutdown
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/admin/shutdown"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: "{{oidcTokenUrl}}"
    credentials:
      clientId: "{{clientId}}"
      clientSecret: "{{clientSecret}}"
      placement: body
    resourceOwner:
      username: "{{username}}"
      password: "{{password}}"
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: true
      autoRefreshToken: false

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.message
      operator: matches
      value: ^Server is shutting down

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
