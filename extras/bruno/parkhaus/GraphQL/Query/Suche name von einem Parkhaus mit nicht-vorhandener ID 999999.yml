info:
  name: Suche name von einem Parkhaus mit nicht-vorhandener ID 999999
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  body:
    query: |-
      query ($parkhausId: ID! = "999999") {
        parkhaus(parkhausId: $parkhausId) {
          id
          version
          name
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
