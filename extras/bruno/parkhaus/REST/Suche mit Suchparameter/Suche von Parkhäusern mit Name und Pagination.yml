info:
  name: Suche von Parkhäusern mit Name und Pagination
  type: http
  seq: 2

http:
  method: GET
  url: "{{restParkhaeuserUrl}}/?name=A&page1&size=1"
  params:
    - name: name
      value: A
      type: query
    - name: page1
      value: ""
      type: query
    - name: size
      value: "1"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
