name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ruff Lint
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.6"
          args: "check src tests"

      - name: Ruff Format Check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.6"
          args: "format --check src tests"
